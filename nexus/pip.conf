# Nexus PyPI proxy configuration for pip.
#
# Routes all `pip install` traffic through a Sonatype Nexus repository
# (group repo that proxies pypi.org and serves any privately published packages).
#
# Usage:
#   • Project-local:  export PIP_CONFIG_FILE=$(pwd)/nexus/pip.conf
#   • User-global:    copy to  ~/.config/pip/pip.conf   (Linux/macOS)
#                              %APPDATA%\pip\pip.ini     (Windows)
#
# Replace the placeholders below with your Nexus server details. If the repo
# requires auth, prefer credentials in the URL via env vars rather than here:
#   index-url = https://${NEXUS_USER}:${NEXUS_PASS}@nexus.example.com/repository/pypi-group/simple

[global]
index-url = https://nexus.example.com/repository/pypi-group/simple
# Allow falling back to public PyPI if Nexus is unreachable (remove to force Nexus only):
extra-index-url = https://pypi.org/simple

# Trust the host when using a self-signed / internal TLS cert (otherwise omit):
trusted-host =
    nexus.example.com

# Be patient with a slow internal proxy:
timeout = 60
